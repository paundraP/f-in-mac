name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Fuzz (short)
        run: go test ./pkg/prefetch/ -fuzz=FuzzLZXpressHuffmanDecompress -fuzztime=10s

      - name: Build (darwin/amd64)
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o /dev/null ./cmd/pfparse/

      - name: Build (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null ./cmd/pfparse/

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /dev/null ./cmd/pfparse/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
